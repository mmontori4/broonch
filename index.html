<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a1a">
  <title>broonch gym</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- Screen 1: Profile Selection -->
  <div id="screen-profile" class="screen active">
    <div class="profile-container">
      <h1 class="profile-title">which broonch are you?</h1>
      <div class="profile-cards">
        <button class="profile-card" data-user="huels" onclick="App.selectProfile('huels')">
          <img class="character-img" src="img/falco.png" alt="Falco">
          <span class="profile-name">huels</span>
        </button>
        <button class="profile-card" data-user="manoot" onclick="App.selectProfile('manoot')">
          <img class="character-img" src="img/fox.png" alt="Fox">
          <span class="profile-name">manoot</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Screen 2: Reunions Dashboard -->
  <div id="screen-dashboard" class="screen">
    <header class="r-header">
      <div class="r-header-left">
        <div class="r-header-tag">ROAD TO REUNIONS</div>
        <div class="r-countdown">
          <span id="r-days-left" class="r-days-num">49</span>
          <span class="r-days-label">days</span>
        </div>
      </div>
      <div class="r-header-right">
        <div id="r-week" class="r-week-label">WK 1/7</div>
        <span id="r-phase" class="phase-badge">REBUILD</span>
      </div>
    </header>
    <div class="week-progress" style="margin:0 16px 0">
      <div class="week-progress-bar" id="r-progress"></div>
    </div>

    <div class="r-tabs">
      <button class="r-tab active" data-view="today" onclick="Reunions.setView('today')">Today</button>
      <button class="r-tab" data-view="plan" onclick="Reunions.setView('plan')">Plan</button>
      <button class="r-tab" data-view="checkin" onclick="Reunions.setView('checkin')">Check-in</button>
      <button class="r-tab" data-view="log" onclick="Reunions.setView('log')">Log</button>
    </div>

    <div class="r-body" id="r-body"></div>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-screen="dashboard" onclick="App.showScreen('dashboard')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-screen="wallet" onclick="App.showScreen('wallet')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/><circle cx="17" cy="14" r="1.5" fill="currentColor"/></svg>
        <span>Ratito</span>
      </button>
      <button class="nav-btn" data-screen="trends" onclick="App.showScreen('trends')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Trends</span>
      </button>
    </nav>
  </div>

  <!-- Screen 3: Workout Tracker -->
  <div id="screen-tracker" class="screen">
    <header class="tracker-header">
      <button class="back-btn" onclick="App.showScreen('dashboard')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="tracker-title-wrap">
        <h2 id="tracker-title">Workout</h2>
        <span id="tracker-subtitle" class="tracker-sub"></span>
      </div>
      <button class="save-btn" id="save-btn" onclick="Tracker.save()">Save</button>
    </header>
    <div class="tracker-body" id="tracker-body"></div>
  </div>

  <!-- Screen 4: Ratito Wallet -->
  <div id="screen-wallet" class="screen">
    <header class="wallet-header">
      <h2>ratito wallet</h2>
    </header>
    <div class="wallet-body" id="wallet-body"></div>
    <nav class="bottom-nav">
      <button class="nav-btn" data-screen="dashboard" onclick="App.showScreen('dashboard')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-btn active" data-screen="wallet" onclick="App.showScreen('wallet')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/><circle cx="17" cy="14" r="1.5" fill="currentColor"/></svg>
        <span>Ratito</span>
      </button>
      <button class="nav-btn" data-screen="trends" onclick="App.showScreen('trends')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Trends</span>
      </button>
    </nav>
  </div>

  <!-- Screen 5: Trends -->
  <div id="screen-trends" class="screen">
    <header class="trends-header">
      <h2>Trends</h2>
    </header>
    <div class="trends-body">
      <div class="trend-section">
        <h3>Exercise Progression</h3>
        <div class="chart-select-row">
          <select id="exercise-select" onchange="Trends.renderExerciseChart()"></select>
        </div>
        <div class="chart-container"><canvas id="chart-exercise"></canvas></div>
      </div>
      <div class="trend-section">
        <h3>Attendance</h3>
        <div class="attendance-grid" id="attendance-grid"></div>
      </div>
      <div class="trend-section">
        <h3>Cardio HR</h3>
        <div class="chart-container"><canvas id="chart-cardio"></canvas></div>
      </div>
    </div>
    <nav class="bottom-nav">
      <button class="nav-btn" data-screen="dashboard" onclick="App.showScreen('dashboard')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
        <span>Home</span>
      </button>
      <button class="nav-btn" data-screen="wallet" onclick="App.showScreen('wallet')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/><circle cx="17" cy="14" r="1.5" fill="currentColor"/></svg>
        <span>Ratito</span>
      </button>
      <button class="nav-btn active" data-screen="trends" onclick="App.showScreen('trends')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        <span>Trends</span>
      </button>
    </nav>
  </div>

  <div id="stopwatch-bar" class="stopwatch-bar hidden" aria-live="polite">
    <button type="button" class="sw-btn sw-start" id="sw-start" onclick="Stopwatch.start()">Start</button>
    <div class="sw-display" id="sw-time">0:00</div>
    <button type="button" class="sw-btn sw-lap" id="sw-lap" onclick="Stopwatch.lap()">Lap</button>
    <button type="button" class="sw-btn sw-stop" id="sw-stop" onclick="Stopwatch.stop()">Stop</button>
  </div>

  <script src="js/data.js"></script>
  <script src="js/store.js"></script>
  <script src="js/sync.js"></script>
  <script src="js/tracker.js"></script>
  <script src="js/wallet.js"></script>
  <script src="js/trends.js"></script>
  <script src="js/reunions.js"></script>
  <script src="js/app.js"></script>
  <script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
</body>
</html>
